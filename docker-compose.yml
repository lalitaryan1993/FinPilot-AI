services:

  # ============================================================
  # APPLICATION
  # ============================================================
  app:
    build:
      context: .
      target: development
    container_name: finpilot_app
    restart: unless-stopped
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules
    environment:
      APP_ENV: local
      APP_KEY: ${APP_KEY}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-finpilot}
      DB_USERNAME: ${DB_USERNAME:-finpilot}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      REVERB_APP_ID: ${REVERB_APP_ID}
      REVERB_APP_KEY: ${REVERB_APP_KEY}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
    ports:
      - "8000:80"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - finpilot

  # ============================================================
  # QUEUE WORKER (Horizon — runs on Linux, needs pcntl)
  # ============================================================
  horizon:
    build:
      context: .
      target: development
    container_name: finpilot_horizon
    restart: unless-stopped
    command: php artisan horizon
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
    environment:
      APP_ENV: local
      APP_KEY: ${APP_KEY}
      DB_HOST: mysql
      DB_DATABASE: ${DB_DATABASE:-finpilot}
      DB_USERNAME: ${DB_USERNAME:-finpilot}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
    depends_on:
      - app
      - redis
    networks:
      - finpilot

  # ============================================================
  # WEBSOCKET SERVER (Laravel Reverb)
  # ============================================================
  reverb:
    build:
      context: .
      target: development
    container_name: finpilot_reverb
    restart: unless-stopped
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
    environment:
      APP_ENV: local
      APP_KEY: ${APP_KEY}
      DB_HOST: mysql
      REDIS_HOST: redis
      REVERB_APP_ID: ${REVERB_APP_ID}
      REVERB_APP_KEY: ${REVERB_APP_KEY}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET}
      REVERB_HOST: 0.0.0.0
      REVERB_PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      - app
    networks:
      - finpilot

  # ============================================================
  # SCHEDULER
  # ============================================================
  scheduler:
    build:
      context: .
      target: development
    container_name: finpilot_scheduler
    restart: unless-stopped
    command: php artisan schedule:work
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
    environment:
      APP_ENV: local
      APP_KEY: ${APP_KEY}
      DB_HOST: mysql
      DB_DATABASE: ${DB_DATABASE:-finpilot}
      DB_USERNAME: ${DB_USERNAME:-finpilot}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
    depends_on:
      - app
    networks:
      - finpilot

  # ============================================================
  # MYSQL 8.0
  # ============================================================
  mysql:
    image: mysql:8.0
    container_name: finpilot_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-finpilot}
      MYSQL_USER: ${DB_USERNAME:-finpilot}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootsecret}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - finpilot

  # ============================================================
  # REDIS 7
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: finpilot_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - finpilot

  # ============================================================
  # MEILISEARCH
  # ============================================================
  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: finpilot_meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_KEY:-devmasterkey}
      MEILI_ENV: development
    volumes:
      - meilisearch_data:/meili_data
    ports:
      - "7700:7700"
    networks:
      - finpilot

  # ============================================================
  # OLLAMA — local AI fallback (optional, GPU-capable)
  # ============================================================
  ollama:
    image: ollama/ollama:latest
    container_name: finpilot_ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    profiles:
      - ollama
    networks:
      - finpilot

volumes:
  mysql_data:
  redis_data:
  meilisearch_data:
  ollama_data:

networks:
  finpilot:
    driver: bridge
